name: LogMeIn CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    
    # On monte une base de données temporaire pour valider les tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: logs_db
          POSTGRES_USER: logs_user
          POSTGRES_PASSWORD: logs_password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Configuration Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 3. Installation des dépendances
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements.dev.txt

      - name: 4. Exécution des tests automatisés (Pytest)
        env:
          DB_HOST: localhost
          DB_NAME: logs_db
          DB_USER: logs_user
          DB_PASSWORD: logs_password
          DB_PORT: 5432
        run: |
          cd backend
          sh run_tests.sh

      - name: 5. Scan de sécurité Trivy (Vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # On laisse passer pour l'instant, mais on affiche les failles
