services:
  db:
    image: postgres:15
    container_name: logs-db
    environment:
      POSTGRES_DB: logs_db
      POSTGRES_USER: logs_user
      POSTGRES_PASSWORD: logs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    image: hichemmlh/logmein-backend:latest
    container_name: logs-backend
    environment:
      DB_HOST: db
      DB_NAME: logs_db
      DB_USER: logs_user
      DB_PASSWORD: logs_password
      DB_PORT: 5432
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: hichemmlh/logmein-frontend:latest
    container_name: logs-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
