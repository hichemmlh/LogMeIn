version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: logs_user
      POSTGRES_PASSWORD: logs_password
      POSTGRES_DB: logs_db
    networks:
      - logmein-net
    deploy:
      placement:
        constraints: [node.role == manager]

  backend:
    image: hichemmlh/logmein-backend:latest
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
    networks:
      - logmein-net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  frontend:
    image: hichemmlh/logmein-frontend:latest
    ports:
      - "80:80"
    networks:
      - logmein-net
    deploy:
      replicas: 2

networks:
  logmein-net:
    driver: overlay
